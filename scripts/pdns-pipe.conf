# /etc/powerdns/pdns.d/pipe-dnsbl.conf
#
# PowerDNS pipe backend configuration for dnsbl.whizardries.com.
#
# Drop this file into /etc/powerdns/pdns.d/ on Harry.
# PowerDNS will auto-include all *.conf files from that directory.
#
# This config adds the pipe backend alongside whatever backends are
# already launched (gmysql, bind, etc.)  It does NOT replace them.
#
# After deploying:
#   systemctl restart pdns
#   pdnsutil check-zone dnsbl.whizardries.com
#
# Reference: https://doc.powerdns.com/authoritative/backends/pipe.html

# Add the pipe backend to whatever is already in pdns.conf.
# This appends rather than replaces, so existing backends keep running.
launch+=pipe

# Absolute path to the Python script.
pipe-command=/opt/blocklist/dnsbl-pipe.py

# Number of pipe backend instances PowerDNS will spawn.
# Each instance handles one query at a time (the protocol is synchronous).
# 2-4 is enough for a DNSBL with moderate query rates.
# Note: renamed from pipe-instances to pipe-instance-count in PowerDNS 4.5.
pipe-instance-count=2

# Timeout in milliseconds for the script to respond to a query.
# If exceeded PowerDNS kills and restarts the instance.
pipe-timeout=2000

# Restrict this backend to answering only for this zone.
# PowerDNS will not even send queries for other zones to the pipe.
# Must match DNSBL_ZONE in blocklist.conf.
pipe-regex=dnsbl\.whizardries\.com$
